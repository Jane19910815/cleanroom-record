<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>環境溫濕度紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJZ9N2f9iAlmhVwpEsuwxNNsxkdpGwXEMHrutgr-dF22wiHOcr0j1kveIrcFUxvu4c/exec"; 
    </script>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        <header class="bg-blue-600 text-white p-4 shadow-md">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="thermometer-sun"></i> 
                環境紀錄系統
            </h1>
        </header>

        <div class="flex border-b border-gray-200">
            <button id="tab-record" class="flex-1 py-3 text-center tab-active flex flex-col items-center" onclick="switchTab('record')">
                <span class="text-sm">新增紀錄</span>
            </button>
            <button id="tab-history" class="flex-1 py-3 text-center text-gray-500 flex flex-col items-center" onclick="switchTab('history')">
                <span class="text-sm">歷史紀錄</span>
            </button>
        </div>

        <main class="flex-1 p-4 overflow-y-auto">
            
            <div id="section-record" class="space-y-4">
                <form id="recordForm" class="space-y-4" onsubmit="submitData(event)">
                    
                    <div>
                        <label class="block text-sm font-semibold mb-2 flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-4 h-4 text-emerald-500"></i>
                            紀錄區域
                        </label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center justify-center p-3.5 border border-gray-300 rounded-xl cursor-pointer bg-white font-medium shadow-sm transition-all active:scale-95 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 has-[:checked]:ring-2 has-[:checked]:ring-blue-200">
                                <input type="radio" name="area" value="OCA(前)" required class="w-4 h-4 text-blue-600 mr-2"> OCA(前)
                            </label>
                            <label class="flex items-center justify-center p-3.5 border border-gray-300 rounded-xl cursor-pointer bg-white font-medium shadow-sm transition-all active:scale-95 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 has-[:checked]:ring-2 has-[:checked]:ring-blue-200">
                                <input type="radio" name="area" value="OCR(後)" class="w-4 h-4 text-blue-600 mr-2"> OCR(後)
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2 flex items-center gap-1">
                            <i data-lucide="power" class="w-4 h-4 text-orange-500"></i>
                            烘箱狀態
                        </label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center justify-center p-3.5 border border-gray-300 rounded-xl cursor-pointer bg-white font-medium shadow-sm transition-all active:scale-95 has-[:checked]:bg-orange-50 has-[:checked]:border-orange-500 has-[:checked]:text-orange-700 has-[:checked]:ring-2 has-[:checked]:ring-orange-200">
                                <input type="radio" name="oven" value="開啟" required class="w-4 h-4 text-orange-600 mr-2">
                                <i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> 開啟
                            </label>
                            <label class="flex items-center justify-center p-3.5 border border-gray-300 rounded-xl cursor-pointer bg-white font-medium shadow-sm transition-all active:scale-95 has-[:checked]:bg-slate-100 has-[:checked]:border-slate-400 has-[:checked]:text-slate-700">
                                <input type="radio" name="oven" value="關閉" class="w-4 h-4 text-slate-600 mr-2">
                                <i data-lucide="x-circle" class="w-4 h-4 mr-1"></i> 關閉
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2 flex items-center gap-1">
                            <i data-lucide="lightbulb" class="w-4 h-4 text-yellow-500"></i>
                            改質燈狀態
                        </label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center justify-center p-3.5 border border-gray-300 rounded-xl cursor-pointer bg-white font-medium shadow-sm transition-all active:scale-95 has-[:checked]:bg-yellow-50 has-[:checked]:border-yellow-500 has-[:checked]:text-yellow-700 has-[:checked]:ring-2 has-[:checked]:ring-yellow-100">
                                <input type="radio" name="lamp" value="開啟" required class="w-4 h-4 text-yellow-600 mr-2">
                                <i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> 開啟
                            </label>
                            <label class="flex items-center justify-center p-3.5 border border-gray-300 rounded-xl cursor-pointer bg-white font-medium shadow-sm transition-all active:scale-95 has-[:checked]:bg-slate-100 has-[:checked]:border-slate-400 has-[:checked]:text-slate-700">
                                <input type="radio" name="lamp" value="關閉" class="w-4 h-4 text-slate-600 mr-2">
                                <i data-lucide="x-circle" class="w-4 h-4 mr-1"></i> 關閉
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1 flex items-center gap-1">
                            <i data-lucide="thermometer" class="w-4 h-4 text-red-500"></i>
                            溫度 (°C)
                        </label>
                        <input type="number" id="temp" step="0.1" required placeholder="28.3" class="w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold mb-1 flex items-center gap-1">
                            <i data-lucide="droplets" class="w-4 h-4 text-blue-500"></i>
                            濕度 (%)
                        </label>
                        <input type="number" id="humidity" step="0.1" required placeholder="38.5" class="w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1 flex items-center gap-1">
                            <i data-lucide="file-text" class="w-4 h-4 text-gray-500"></i>
                            備註 (選填)
                        </label>
                        <textarea id="note" rows="2" placeholder="例如: 感覺異常悶熱" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2 flex items-center gap-1">
                            <i data-lucide="image" class="w-4 h-4 text-gray-500"></i>
                            現場照片 (選填)
                        </label>
                        
                        <input type="file" id="albumInput" accept="image/*" class="hidden" onchange="handleImage(this)">

                        <div id="photoActionButtons">
                            <button type="button" onclick="document.getElementById('albumInput').click()" class="w-full flex flex-col items-center justify-center h-24 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-emerald-50 hover:bg-emerald-100 transition shadow-sm active:scale-95">
                                <i data-lucide="image-plus" class="w-6 h-6 text-emerald-600 mb-1"></i>
                                <span class="text-sm font-medium text-emerald-800">從相簿選擇照片</span>
                            </button>
                        </div>

                        <div id="previewContainer" class="mt-3 relative hidden">
                            <div class="bg-gray-100 text-gray-600 text-xs py-1 px-2 rounded-t-lg border-b border-gray-200 flex items-center gap-1">
                                <i data-lucide="clock" class="w-3 h-3"></i>
                                <span id="photoTimeTag"></span>
                            </div>
                            <img id="imagePreview" class="w-full rounded-b-lg border border-gray-300 object-contain bg-black" />
                            <button type="button" onclick="removePhoto()" class="absolute top-1 right-1 bg-red-500/80 hover:bg-red-600 text-white p-1.5 rounded-full shadow-sm backdrop-blur-sm">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg shadow-md hover:bg-blue-700 active:bg-blue-800 transition flex justify-center items-center gap-2 mt-4">
                        <i data-lucide="send" class="w-5 h-5"></i>
                        <span>送出紀錄</span>
                    </button>
                    
                    <div id="loadingStatus" class="hidden flex-col items-center justify-center py-4 text-blue-600">
                        <div class="loader mb-2"></div>
                        <span class="text-sm font-medium">資料加密上傳中...</span>
                    </div>
                </form>
            </div>

            <div id="section-history" class="hidden space-y-4">
                <button onclick="loadHistory()" class="w-full bg-white border border-gray-300 text-gray-700 font-medium py-2 rounded-lg shadow-sm flex justify-center items-center gap-2 active:bg-gray-50">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> 重新整理
                </button>
                <div id="historyLoading" class="hidden flex justify-center py-8">
                    <div class="loader border-gray-300 border-top-gray-600"></div>
                </div>
                <div id="historyList" class="space-y-3 pb-8">
                    <p class="text-center text-gray-500 py-8 text-sm">請點擊上方按鈕載入紀錄</p>
                </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();
        let compressedImageBase64 = "";

        function switchTab(tabId) {
            document.getElementById('section-record').classList.add('hidden');
            document.getElementById('section-history').classList.add('hidden');
            document.getElementById('tab-record').classList.remove('tab-active', 'text-gray-500');
            document.getElementById('tab-history').classList.remove('tab-active', 'text-gray-500');
            
            if(tabId === 'record') {
                document.getElementById('section-record').classList.remove('hidden');
                document.getElementById('tab-record').classList.add('tab-active');
                document.getElementById('tab-history').classList.add('text-gray-500');
            } else {
                document.getElementById('section-history').classList.remove('hidden');
                document.getElementById('tab-history').classList.add('tab-active');
                document.getElementById('tab-record').classList.add('text-gray-500');
                if(document.getElementById('historyList').children.length <= 1) {
                    loadHistory();
                }
            }
        }

        function removePhoto() {
            compressedImageBase64 = "";
            document.getElementById('imagePreview').src = "";
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('photoActionButtons').classList.remove('hidden');
            document.getElementById('albumInput').value = "";
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1024; 
                        const MAX_HEIGHT = 1024;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        const preview = document.getElementById('imagePreview');
                        preview.src = compressedImageBase64;
                        
                        const now = new Date();
                        const timeString = now.toLocaleString('zh-TW', { hour12: false });
                        document.getElementById('photoTimeTag').textContent = `已選擇照片於：${timeString} (準備上傳)`;

                        document.getElementById('previewContainer').classList.remove('hidden');
                        document.getElementById('photoActionButtons').classList.add('hidden');
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        async function submitData(event) {
            event.preventDefault();
            
            if (SCRIPT_URL === "在此貼上你的_GOOGLE_APPS_SCRIPT_網址") {
                alert("錯誤：請先在程式碼中設定 SCRIPT_URL！");
                return;
            }

            // 抓取勾選的 radio 值
            const area = document.querySelector('input[name="area"]:checked')?.value || "";
            const oven = document.querySelector('input[name="oven"]:checked')?.value || "";
            const lamp = document.querySelector('input[name="lamp"]:checked')?.value || "";
            
            const temp = document.getElementById('temp').value;
            const humidity = document.getElementById('humidity').value;
            const note = document.getElementById('note').value;

            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('loadingStatus').classList.remove('hidden');
            document.getElementById('loadingStatus').classList.add('flex');

            const payload = { area, oven, lamp, temp, humidity, note, image: compressedImageBase64 };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if(result.status === 'success') {
                    alert('✅ 紀錄成功！');
                    document.getElementById('recordForm').reset();
                    removePhoto(); 
                    switchTab('history');
                    loadHistory();
                } else {
                    alert('❌ 發生錯誤: ' + result.message);
                }
            } catch (error) {
                alert('❌ 網路連接失敗。\n' + error);
            } finally {
                document.getElementById('submitBtn').classList.remove('hidden');
                document.getElementById('loadingStatus').classList.add('hidden');
                document.getElementById('loadingStatus').classList.remove('flex');
            }
        }

        async function loadHistory() {
            if (SCRIPT_URL === "在此貼上你的_GOOGLE_APPS_SCRIPT_網址") {
                document.getElementById('historyList').innerHTML = '<p class="text-center text-red-500 py-4">URL 未設定</p>';
                return;
            }

            const historyList = document.getElementById('historyList');
            const historyLoading = document.getElementById('historyLoading');
            
            historyList.innerHTML = '';
            historyLoading.classList.remove('hidden');

            try {
                const response = await fetch(SCRIPT_URL, { redirect: 'follow' });
                const textData = await response.text();
                
                let data;
                try {
                    data = JSON.parse(textData);
                } catch (e) {
                    throw new Error("格式解析失敗。請確認 Apps Script 部署權限。");
                }
                
                historyLoading.classList.add('hidden');
                
                if(data.status === 'error') {
                    throw new Error(data.message);
                }

                if(!Array.isArray(data) || data.length === 0) {
                    historyList.innerHTML = '<p class="text-center text-gray-500 py-8">尚無紀錄</p>';
                    return;
                }

                data.forEach(item => {
                    const hasImage = item.image && item.image.includes('drive.google.com');
                    const imageBtn = hasImage 
                        ? `<a href="${item.image}" target="_blank" class="mt-3 w-full inline-flex justify-center items-center gap-2 text-sm text-blue-700 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg font-medium transition border border-blue-200"><i data-lucide="image" class="w-4 h-4"></i> 查看現場照片</a>` 
                        : '';

                    const noteHtml = item.note ? `<div class="mt-3 bg-gray-50 p-3 rounded-lg border border-gray-100"><p class="text-sm text-gray-700">${item.note}</p></div>` : '';

                    // 標籤樣式設定
                    const areaBadge = item.area ? `<span class="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded-md font-bold border border-emerald-200 whitespace-nowrap">${item.area}</span>` : '';
                    
                    let ovenColor = item.oven === '開啟' ? 'bg-orange-100 text-orange-800 border-orange-200' : 'bg-gray-100 text-gray-600 border-gray-200';
                    const ovenBadge = item.oven ? `<span class="${ovenColor} text-xs px-2 py-1 rounded-md font-bold border flex items-center gap-1 whitespace-nowrap"><i data-lucide="power" class="w-3 h-3"></i>烘箱: ${item.oven}</span>` : '';

                    let lampColor = item.lamp === '開啟' ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 'bg-gray-100 text-gray-600 border-gray-200';
                    const lampBadge = item.lamp ? `<span class="${lampColor} text-xs px-2 py-1 rounded-md font-bold border flex items-center gap-1 whitespace-nowrap"><i data-lucide="lightbulb" class="w-3 h-3"></i>改質燈: ${item.lamp}</span>` : '';

                    const card = `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                            <div class="flex justify-between items-center border-b border-gray-100 pb-3 mb-3">
                                <span class="text-sm font-bold text-gray-700 flex items-center gap-2">
                                    <i data-lucide="calendar-clock" class="w-4 h-4 text-blue-500"></i>
                                    ${item.timestamp}
                                </span>
                                <div class="flex gap-1 overflow-x-auto">
                                    ${lampBadge}
                                    ${ovenBadge}
                                    ${areaBadge}
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <div class="flex-1 bg-red-50/50 p-3 rounded-lg border border-red-100 text-center">
                                    <p class="text-xs text-gray-500 mb-1 flex justify-center items-center gap-1"><i data-lucide="thermometer" class="w-3 h-3 text-red-500"></i>溫度</p>
                                    <p class="text-2xl font-bold text-red-600">${item.temp}<span class="text-base font-normal text-red-400 ml-1">°C</span></p>
                                </div>
                                <div class="flex-1 bg-blue-50/50 p-3 rounded-lg border border-blue-100 text-center">
                                    <p class="text-xs text-gray-500 mb-1 flex justify-center items-center gap-1"><i data-lucide="droplets" class="w-3 h-3 text-blue-500"></i>濕度</p>
                                    <p class="text-2xl font-bold text-blue-600">${item.humidity}<span class="text-base font-normal text-blue-400 ml-1">%</span></p>
                                </div>
                            </div>
                            ${noteHtml}
                            ${imageBtn}
                        </div>
                    `;
                    historyList.insertAdjacentHTML('beforeend', card);
                });
                
                lucide.createIcons();
                
            } catch (error) {
                historyLoading.classList.add('hidden');
                historyList.innerHTML = `
                    <div class="bg-red-50 border border-red-200 p-4 rounded-lg m-2 flex items-center gap-3">
                        <i data-lucide="alert-circle" class="text-red-500 w-6 h-6"></i>
                        <div>
                            <p class="text-red-700 font-bold">讀取失敗</p>
                            <p class="text-xs text-red-600">${error.message}</p>
                        </div>
                    </div>`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
