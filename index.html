<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>環境溫濕度紀錄 | Ghi lại nhiệt độ và độ ẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <!-- ⚠️ 重要：請將下方的 URL 替換成你的 Google Apps Script 部署網址 -->
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJZ9N2f9iAlmhVwpEsuwxNNsxkdpGwXEMHrutgr-dF22wiHOcr0j1kveIrcFUxvu4c/exec"; 
    </script>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4 shadow-md">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="thermometer-sun"></i> 
                環境紀錄系統
            </h1>
            <p class="text-xs opacity-80 mt-1">Hệ thống ghi lại môi trường</p>
        </header>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200">
            <button id="tab-record" class="flex-1 py-3 text-center tab-active flex flex-col items-center" onclick="switchTab('record')">
                <span class="text-sm">新增紀錄</span>
                <span class="text-xs opacity-70">Thêm mới</span>
            </button>
            <button id="tab-history" class="flex-1 py-3 text-center text-gray-500 flex flex-col items-center" onclick="switchTab('history')">
                <span class="text-sm">歷史紀錄</span>
                <span class="text-xs opacity-70">Lịch sử</span>
            </button>
        </div>

        <!-- 內容區 -->
        <main class="flex-1 p-4 overflow-y-auto">
            
            <!-- 新增紀錄表單 -->
            <div id="section-record" class="space-y-4">
                <div class="bg-blue-50 border border-blue-200 p-3 rounded-lg flex items-start gap-2">
                    <i data-lucide="info" class="text-blue-500 shrink-0 mt-0.5"></i>
                    <div>
                        <p class="text-sm text-blue-800">時間將於送出時自動記錄。</p>
                        <p class="text-xs text-blue-600">Thời gian sẽ được tự động ghi lại khi gửi.</p>
                    </div>
                </div>

                <form id="recordForm" class="space-y-4" onsubmit="submitData(event)">
                    <!-- 溫度 -->
                    <div>
                        <label class="block text-sm font-semibold mb-1">溫度 / Nhiệt độ (°C)</label>
                        <input type="number" id="temp" step="0.1" required placeholder="例如: 28.3" class="w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    
                    <!-- 濕度 -->
                    <div>
                        <label class="block text-sm font-semibold mb-1">濕度 / Độ ẩm (%)</label>
                        <input type="number" id="humidity" step="0.1" required placeholder="例如: 38.5" class="w-full border border-gray-300 rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>

                    <!-- 備註 -->
                    <div>
                        <label class="block text-sm font-semibold mb-1">備註 / Ghi chú (選填/Tùy chọn)</label>
                        <textarea id="note" rows="2" placeholder="例如: 感覺異常悶熱 / Cảm thấy rất ngột ngạt" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>

                    <!-- 拍照 -->
                    <div>
                        <label class="block text-sm font-semibold mb-1">現場照片 / Ảnh hiện trường (選填/Tùy chọn)</label>
                        <div class="mt-1 flex items-center justify-center w-full">
                            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 relative overflow-hidden" id="photoContainer">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6" id="photoPlaceholder">
                                    <i data-lucide="camera" class="w-8 h-8 text-gray-400 mb-2"></i>
                                    <p class="text-sm text-gray-500">點擊拍照 / Nhấn để chụp</p>
                                </div>
                                <img id="imagePreview" class="absolute inset-0 w-full h-full object-cover hidden" />
                                <!-- capture="environment" 會直接開啟手機後置鏡頭 -->
                                <input id="photoInput" type="file" accept="image/*" capture="environment" class="hidden" onchange="handleImage(this)" />
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg shadow-md hover:bg-blue-700 active:bg-blue-800 transition flex justify-center items-center gap-2">
                        <span>送出紀錄 / Gửi dữ liệu</span>
                    </button>
                    
                    <div id="loadingStatus" class="hidden flex-col items-center justify-center py-4 text-blue-600">
                        <div class="loader mb-2"></div>
                        <span class="text-sm font-medium">上傳中，請稍候... / Đang tải lên...</span>
                    </div>
                </form>
            </div>

            <!-- 歷史紀錄 -->
            <div id="section-history" class="hidden space-y-4">
                <button onclick="loadHistory()" class="w-full bg-white border border-gray-300 text-gray-700 font-medium py-2 rounded-lg shadow-sm flex justify-center items-center gap-2 active:bg-gray-50">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> 重新整理 / Làm mới
                </button>
                <div id="historyLoading" class="hidden flex justify-center py-8">
                    <div class="loader"></div>
                </div>
                <div id="historyList" class="space-y-3 pb-8">
                    <!-- 紀錄將透過 JS 載入於此 -->
                    <p class="text-center text-gray-500 py-8 text-sm">請點擊上方按鈕載入紀錄<br>Nhấn nút trên để tải dữ liệu</p>
                </div>
            </div>

        </main>
    </div>

    <script>
        // 初始化 Icons
        lucide.createIcons();

        let compressedImageBase64 = "";

        // 切換分頁
        function switchTab(tabId) {
            document.getElementById('section-record').classList.add('hidden');
            document.getElementById('section-history').classList.add('hidden');
            document.getElementById('tab-record').classList.remove('tab-active', 'text-gray-500');
            document.getElementById('tab-history').classList.remove('tab-active', 'text-gray-500');
            
            if(tabId === 'record') {
                document.getElementById('section-record').classList.remove('hidden');
                document.getElementById('tab-record').classList.add('tab-active');
                document.getElementById('tab-history').classList.add('text-gray-500');
            } else {
                document.getElementById('section-history').classList.remove('hidden');
                document.getElementById('tab-history').classList.add('tab-active');
                document.getElementById('tab-record').classList.add('text-gray-500');
                if(document.getElementById('historyList').children.length <= 1) {
                    loadHistory();
                }
            }
        }

        // 處理照片選擇與壓縮 (避免圖檔過大傳送失敗)
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        // 限制圖片最大寬高，兼顧清晰度與上傳速度
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // --- 新增：在照片右下角壓印時間日期 (浮水印) ---
                        const now = new Date();
                        // 格式化時間，例如：2026/06/09 14:30:45
                        const timeString = now.toLocaleString('zh-TW', { 
                            year: 'numeric', month: '2-digit', day: '2-digit',
                            hour: '2-digit', minute: '2-digit', second: '2-digit',
                            hour12: false 
                        });
                        
                        // 設定文字大小與字體 (依據圖片寬度比例自動調整大小)
                        const fontSize = Math.max(16, Math.floor(width * 0.04));
                        ctx.font = `bold ${fontSize}px sans-serif`;
                        
                        // 測量文字寬度
                        const textMetrics = ctx.measureText(timeString);
                        const textWidth = textMetrics.width;
                        const padding = 10;
                        const rectHeight = fontSize + padding * 2;
                        
                        // 繪製半透明黑色背景 (確保浮水印在白色或黑色背景都清晰可見)
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                        ctx.fillRect(width - textWidth - padding * 2, height - rectHeight, textWidth + padding * 2, rectHeight);
                        
                        // 繪製白色文字
                        ctx.fillStyle = '#FFFFFF';
                        ctx.textAlign = 'right';
                        ctx.textBaseline = 'bottom';
                        // 依據字體大小微調垂直位置
                        ctx.fillText(timeString, width - padding, height - padding - (fontSize * 0.1));
                        // ---------------------------------------------

                        // 壓縮品質 0.6
                        compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        // 顯示預覽圖
                        const preview = document.getElementById('imagePreview');
                        preview.src = compressedImageBase64;
                        preview.classList.remove('hidden');
                        document.getElementById('photoPlaceholder').classList.add('hidden');
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // 送出資料
        async function submitData(event) {
            event.preventDefault();
            
            if (SCRIPT_URL === "在此貼上你的_GOOGLE_APPS_SCRIPT_網址") {
                alert("錯誤：請先在程式碼中設定 SCRIPT_URL！\nLỗi: Vui lòng thiết lập URL kịch bản!");
                return;
            }

            const temp = document.getElementById('temp').value;
            const humidity = document.getElementById('humidity').value;
            const note = document.getElementById('note').value;

            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('loadingStatus').classList.remove('hidden');
            document.getElementById('loadingStatus').classList.add('flex');

            const payload = {
                temp: temp,
                humidity: humidity,
                note: note,
                image: compressedImageBase64
            };

            try {
                // 使用 text/plain 避免 Google Apps Script 的 CORS 預檢問題
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if(result.status === 'success') {
                    alert('✅ 紀錄成功！\nGhi lại thành công!');
                    document.getElementById('recordForm').reset();
                    // 重置圖片
                    compressedImageBase64 = "";
                    document.getElementById('imagePreview').classList.add('hidden');
                    document.getElementById('imagePreview').src = "";
                    document.getElementById('photoPlaceholder').classList.remove('hidden');
                } else {
                    alert('❌ 發生錯誤 (Lỗi): ' + result.message);
                }
            } catch (error) {
                alert('❌ 網路連接失敗，請檢查網路。\nLỗi kết nối mạng, vui lòng kiểm tra lại.\n' + error);
            } finally {
                document.getElementById('submitBtn').classList.remove('hidden');
                document.getElementById('loadingStatus').classList.add('hidden');
                document.getElementById('loadingStatus').classList.remove('flex');
            }
        }

        // 載入歷史紀錄
        async function loadHistory() {
            if (SCRIPT_URL === "在此貼上你的_GOOGLE_APPS_SCRIPT_網址") {
                document.getElementById('historyList').innerHTML = '<p class="text-center text-red-500 py-4">URL 未設定</p>';
                return;
            }

            const historyList = document.getElementById('historyList');
            const historyLoading = document.getElementById('historyLoading');
            
            historyList.innerHTML = '';
            historyLoading.classList.remove('hidden');

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                historyLoading.classList.add('hidden');
                
                if(data.length === 0) {
                    historyList.innerHTML = '<p class="text-center text-gray-500 py-8">尚無紀錄 / Chưa có dữ liệu</p>';
                    return;
                }

                data.forEach(item => {
                    const hasImage = item.image && item.image.startsWith('http');
                    const imageBtn = hasImage 
                        ? `<a href="${item.image}" target="_blank" class="mt-2 inline-flex items-center gap-1 text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-200"><i data-lucide="image" class="w-3 h-3"></i> 查看照片 / Xem ảnh</a>` 
                        : '';

                    const noteHtml = item.note ? `<p class="text-sm text-gray-600 mt-2 bg-gray-50 p-2 rounded">${item.note}</p>` : '';

                    const card = `
                        <div class="bg-white p-4 rounded-lg shadow border border-gray-100">
                            <div class="flex justify-between items-start border-b border-gray-100 pb-2 mb-2">
                                <span class="text-xs text-gray-500 font-mono">${item.timestamp}</span>
                            </div>
                            <div class="flex gap-4">
                                <div class="flex-1">
                                    <p class="text-xs text-gray-500">溫度 / Nhiệt độ</p>
                                    <p class="text-lg font-bold text-red-600">${item.temp} °C</p>
                                </div>
                                <div class="flex-1 border-l border-gray-200 pl-4">
                                    <p class="text-xs text-gray-500">濕度 / Độ ẩm</p>
                                    <p class="text-lg font-bold text-blue-600">${item.humidity} %</p>
                                </div>
                            </div>
                            ${noteHtml}
                            ${imageBtn}
                        </div>
                    `;
                    historyList.insertAdjacentHTML('beforeend', card);
                });
                
                // 重新初始化新加入的 icons
                lucide.createIcons();
                
            } catch (error) {
                historyLoading.classList.add('hidden');
                historyList.innerHTML = `<p class="text-center text-red-500 py-8">讀取失敗 / Lỗi đọc dữ liệu<br><span class="text-xs">${error}</span></p>`;
            }
        }
    </script>
</body>
</html>
